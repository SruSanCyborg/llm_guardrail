<svg viewBox="0 0 760 920" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b6b"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="760" height="920" fill="#0d1117" rx="12"/>
  <rect x="1" y="1" width="758" height="918" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <text x="380" y="36" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="700" letter-spacing="2">REQUEST PIPELINE FLOW</text>
  <text x="380" y="54" text-anchor="middle" fill="#8b949e" font-size="10">Every message follows this path through Cerebus</text>
  <line x1="60" y1="64" x2="700" y2="64" stroke="#30363d" stroke-width="1"/>

  <!-- Step 1: User Input -->
  <rect x="255" y="80" width="250" height="52" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="380" y="101" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">👤 User Sends Message</text>
  <text x="380" y="119" text-anchor="middle" fill="#8b949e" font-size="10">POST /chat  ·  session_id  ·  security_mode</text>

  <line x1="380" y1="132" x2="380" y2="155" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2: Rate Limit -->
  <polygon points="380,158 490,188 380,218 270,188" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="380" y="184" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="600">Rate Limited?</text>
  <text x="380" y="198" text-anchor="middle" fill="#8b949e" font-size="9">10 req / min / session</text>

  <!-- Rate limit YES -->
  <line x1="490" y1="188" x2="590" y2="188" stroke="#ff6b6b" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="538" y="182" text-anchor="middle" fill="#ff6b6b" font-size="9">YES</text>
  <rect x="592" y="172" width="105" height="32" rx="6" fill="#2a0c0c" stroke="#ff6b6b" stroke-width="1"/>
  <text x="644" y="186" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="600">429 Too Many</text>
  <text x="644" y="198" text-anchor="middle" fill="#ff6b6b" font-size="8">Requests</text>

  <!-- Rate limit NO -->
  <line x1="380" y1="218" x2="380" y2="242" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="392" y="234" fill="#3fb950" font-size="9">NO</text>

  <!-- Step 3: Input Guardrail -->
  <rect x="205" y="244" width="350" height="100" rx="8" fill="#161b22" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="380" y="264" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">🛡 Input Guardrail  :8001</text>
  <line x1="220" y1="272" x2="540" y2="272" stroke="#30363d" stroke-width="1"/>
  <text x="280" y="288" fill="#8b949e" font-size="9">① Pattern scan (60+ regex rules)</text>
  <text x="280" y="303" fill="#8b949e" font-size="9">② DistilBERT+LoRA classification</text>
  <text x="280" y="318" fill="#8b949e" font-size="9">③ Multi-turn escalation check</text>
  <text x="280" y="333" fill="#8b949e" font-size="9">④ Threat vector boost (cosine sim)</text>

  <!-- Labels on right side -->
  <text x="510" y="295" fill="#30363d" font-size="8">SAFE</text>
  <text x="505" y="310" fill="#f97316" font-size="8">INJECTION</text>
  <text x="510" y="325" fill="#ff6b6b" font-size="8">JAILBREAK</text>
  <text x="505" y="340" fill="#bc8cff" font-size="8">EXTRACTION</text>

  <line x1="380" y1="344" x2="380" y2="368" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4: LLM Review Decision -->
  <polygon points="380,370 520,405 380,440 240,405" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="380" y="400" text-anchor="middle" fill="#e3b341" font-size="10.5" font-weight="600">Threat Detected?</text>
  <text x="380" y="414" text-anchor="middle" fill="#8b949e" font-size="8">conf ≥ block threshold</text>

  <!-- Threat YES → LLM Review -->
  <line x1="520" y1="405" x2="590" y2="405" stroke="#e3b341" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="552" y="399" text-anchor="middle" fill="#e3b341" font-size="9">YES</text>
  <rect x="592" y="376" width="120" height="58" rx="6" fill="#1a1608" stroke="#e3b341" stroke-width="1.2"/>
  <text x="652" y="396" text-anchor="middle" fill="#e3b341" font-size="10" font-weight="600">🤖 LLM Review</text>
  <text x="652" y="410" text-anchor="middle" fill="#8b949e" font-size="8">Groq llama-3.1-8b</text>
  <text x="652" y="422" text-anchor="middle" fill="#8b949e" font-size="8">ALLOW / BLOCK?</text>

  <!-- LLM says BLOCK -->
  <line x1="652" y1="434" x2="652" y2="468" stroke="#ff6b6b" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="663" y="454" fill="#ff6b6b" font-size="8">BLOCK</text>
  <rect x="592" y="470" width="120" height="40" rx="6" fill="#2a0c0c" stroke="#ff6b6b" stroke-width="1.2"/>
  <text x="652" y="487" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="600">🚫 Blocked</text>
  <text x="652" y="501" text-anchor="middle" fill="#8b949e" font-size="8">Self-learn notified</text>

  <!-- LLM says ALLOW → curve back to main flow -->
  <path d="M652,376 C652,360 520,355 380,368" fill="none" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ag)"/>
  <text x="570" y="354" text-anchor="middle" fill="#3fb950" font-size="8">ALLOW (override)</text>

  <!-- NO (safe) path -->
  <line x1="380" y1="440" x2="380" y2="464" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="392" y="456" fill="#3fb950" font-size="9">SAFE</text>

  <!-- Step 5: RAG -->
  <rect x="255" y="466" width="250" height="55" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="380" y="487" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">📚 RAG Retrieval  :8004</text>
  <text x="380" y="503" text-anchor="middle" fill="#8b949e" font-size="9">FAISS top-4 docs · MiniLM embeddings</text>
  <text x="380" y="515" text-anchor="middle" fill="#8b949e" font-size="9">Inject context into LLM prompt</text>

  <line x1="380" y1="521" x2="380" y2="543" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 6: Core LLM -->
  <rect x="220" y="545" width="320" height="68" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="380" y="566" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="700">🤖 Core LLM  :8003</text>
  <line x1="235" y1="574" x2="525" y2="574" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="590" text-anchor="middle" fill="#8b949e" font-size="9">Ollama (llama3.2 · local)  or  Groq API (llama-3.3-70b)</text>
  <text x="380" y="605" text-anchor="middle" fill="#8b949e" font-size="9">System prompt · RAG context · user message</text>

  <line x1="380" y1="613" x2="380" y2="635" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 7: Output Guardrail -->
  <rect x="205" y="637" width="350" height="100" rx="8" fill="#161b22" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="380" y="657" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">🛡 Output Guardrail  :8002</text>
  <line x1="220" y1="665" x2="540" y2="665" stroke="#30363d" stroke-width="1"/>
  <text x="270" y="681" fill="#8b949e" font-size="9">① Toxicity check (Detoxify &gt; 0.7)</text>
  <text x="270" y="696" fill="#8b949e" font-size="9">② PII leak (email / SSN / API keys)</text>
  <text x="270" y="711" fill="#8b949e" font-size="9">③ Hallucination (BART NLI &gt; 0.75)</text>
  <text x="270" y="726" fill="#8b949e" font-size="9">④ Bias / stereotype patterns</text>

  <!-- Output guardrail FAIL -->
  <line x1="555" y1="687" x2="615" y2="687" stroke="#ff6b6b" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="582" y="681" text-anchor="middle" fill="#ff6b6b" font-size="8">FAIL</text>
  <rect x="617" y="672" width="90" height="30" rx="5" fill="#2a0c0c" stroke="#ff6b6b" stroke-width="1"/>
  <text x="662" y="687" text-anchor="middle" fill="#ff6b6b" font-size="8.5" font-weight="600">🔇 Filtered</text>
  <text x="662" y="697" text-anchor="middle" fill="#8b949e" font-size="7">Response blocked</text>

  <line x1="380" y1="737" x2="380" y2="759" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="392" y="752" fill="#3fb950" font-size="9">PASS</text>

  <!-- Step 8: Response -->
  <rect x="255" y="761" width="250" height="55" rx="8" fill="#0f2a0f" stroke="#3fb950" stroke-width="2"/>
  <text x="380" y="783" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">✅ Response to User</text>
  <text x="380" y="799" text-anchor="middle" fill="#8b949e" font-size="9">+ XAI badge  ·  label  ·  confidence  ·  reason</text>
  <text x="380" y="812" text-anchor="middle" fill="#8b949e" font-size="9">Logged to SQLite audit trail</text>

  <!-- Self-learning side note -->
  <rect x="30" y="510" width="160" height="72" rx="7" fill="#160f0a" stroke="#f78166" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="110" y="530" text-anchor="middle" fill="#f78166" font-size="10" font-weight="600">🧠 Self-Learning</text>
  <text x="110" y="545" text-anchor="middle" fill="#8b949e" font-size="8">Every BLOCKED event →</text>
  <text x="110" y="558" text-anchor="middle" fill="#8b949e" font-size="8">n-gram pattern extraction</text>
  <text x="110" y="571" text-anchor="middle" fill="#8b949e" font-size="8">threat vector update</text>
  <text x="110" y="584" text-anchor="middle" fill="#8b949e" font-size="8">DistilBERT retraining queue</text>
  <path d="M255,490 C200,490 190,546 193,546" fill="none" stroke="#f78166" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>

  <!-- Security modes note -->
  <rect x="560" y="530" width="155" height="75" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="637" y="550" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600">Security Modes</text>
  <line x1="570" y1="556" x2="705" y2="556" stroke="#30363d" stroke-width="1"/>
  <text x="570" y="570" fill="#e3b341" font-size="8.5" font-weight="600">normal</text><text x="630" y="570" fill="#8b949e" font-size="8">block ≥ 0.85</text>
  <text x="570" y="583" fill="#f97316" font-size="8.5" font-weight="600">strict</text><text x="630" y="583" fill="#8b949e" font-size="8">block ≥ 0.70</text>
  <text x="570" y="596" fill="#ff6b6b" font-size="8.5" font-weight="600">paranoid</text><text x="630" y="596" fill="#8b949e" font-size="8">block ≥ 0.55</text>

  <!-- Footer -->
  <line x1="60" y1="854" x2="700" y2="854" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="876" text-anchor="middle" fill="#30363d" font-size="9">Cerebus — DevsHouse '26 Hackathon · VIT Chennai · github.com/SruSanCyborg/llm_guardrail</text>
</svg>
