  <text x="737" y="470" text-anchor="middle" fill="#30363d" font-size="10" font-weight="600">Ollama :11434</text>
  <text x="737" y="485" text-anchor="middle" fill="#30363d" font-size="8">llama3.2 / local</text>
  <line x1="737" y1="175" x2="737" y2="448" stroke="#30363d" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- Legend -->
  <rect x="30" y="500" width="840" height="45" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="55" cy="522" r="4" fill="#58a6ff"/><text x="65" y="526" fill="#8b949e" font-size="9">Frontend</text>
  <circle cx="130" cy="522" r="4" fill="#e3b341"/><text x="140" y="526" fill="#8b949e" font-size="9">Orchestrator</text>
  <circle cx="220" cy="522" r="4" fill="#ff6b6b"/><text x="230" y="526" fill="#8b949e" font-size="9">Guardrails</text>
  <circle cx="305" cy="522" r="4" fill="#bc8cff"/><text x="315" y="526" fill="#8b949e" font-size="9">Core LLM</text>
  <circle cx="385" cy="522" r="4" fill="#3fb950"/><text x="395" y="526" fill="#8b949e" font-size="9">RAG</text>
  <circle cx="440" cy="522" r="4" fill="#f78166"/><text x="450" y="526" fill="#8b949e" font-size="9">Self-Learning</text>
  <line x1="540" y1="518" x2="560" y2="518" stroke="#3fb950" stroke-width="1.5"/><text x="565" y="522" fill="#8b949e" font-size="9">Safe path</text>
  <line x1="640" y1="518" x2="660" y2="518" stroke="#ff6b6b" stroke-width="1.5"/><text x="665" y="522" fill="#8b949e" font-size="9">Block path</text>
  <line x1="730" y1="518" x2="750" y2="518" stroke="#f78166" stroke-width="1" stroke-dasharray="3 2"/><text x="755" y="522" fill="#8b949e" font-size="9">Async/fire-forget</text>
</svg>
