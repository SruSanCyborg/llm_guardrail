  <text x="737" y="222" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">📚 RAG SERVICE</text>
  <text x="737" y="237" text-anchor="middle" fill="#8b949e" font-size="9">localhost:8004  ·  /retrieve</text>
