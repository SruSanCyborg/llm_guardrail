  <text x="737" y="337" text-anchor="middle" fill="#f78166" font-size="11" font-weight="700">🧠 SELF-LEARNING</text>
  <text x="737" y="352" text-anchor="middle" fill="#8b949e" font-size="9">localhost:8005  ·  /learn</text>
  <line x1="680" y1="359" x2="795" y2="359" stroke="#30363d" stroke-width="1"/>
  <text x="737" y="373" text-anchor="middle" fill="#8b949e" font-size="9">Heretic-inspired vectors</text>
  <text x="737" y="387" text-anchor="middle" fill="#8b949e" font-size="9">TF-IDF n-gram rules</text>
  <text x="737" y="401" text-anchor="middle" fill="#8b949e" font-size="9">DistilBERT retraining</text>

  <!-- Redis + SQLite bottom row -->
  <rect x="225" y="360" width="145" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="297" y="381" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">🗄 Redis  :6379</text>
  <text x="297" y="397" text-anchor="middle" fill="#30363d" font-size="9">Rate limit · Session state</text>
  <text x="297" y="410" text-anchor="middle" fill="#30363d" font-size="9">Sliding window counter</text>

  <rect x="225" y="435" width="145" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="297" y="456" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">📁 SQLite Logs</text>
  <text x="297" y="472" text-anchor="middle" fill="#30363d" font-size="9">SHA-256 hashed prompts</text>
  <text x="297" y="485" text-anchor="middle" fill="#30363d" font-size="9">Full audit trail</text>

  <!-- ── ARROWS ── -->
  <!-- Frontend → Orchestrator -->
  <line x1="160" y1="120" x2="222" y2="175" stroke="#58a6ff" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="160" y1="205" x2="222" y2="205" stroke="#58a6ff" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="160" y1="290" x2="222" y2="380" stroke="#58a6ff" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Orchestrator → Input Guardrail -->
  <line x1="370" y1="160" x2="437" y2="135" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Input Guardrail → Core LLM (safe path) -->
  <line x1="595" y1="120" x2="662" y2="120" stroke="#3fb950" stroke-width="1.3" marker-end="url(#arr-green)"/>
  <text x="625" y="113" text-anchor="middle" fill="#3fb950" font-size="8">SAFE</text>

  <!-- Core LLM ↔ RAG -->
  <line x1="737" y1="175" x2="737" y2="197" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Core LLM → Output Guardrail -->
  <line x1="665" y1="155" x2="597" y2="392" stroke="#bc8cff" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Output Guardrail → Orchestrator (response) -->
  <line x1="440" y1="430" x2="373" y2="255" stroke="#3fb950" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr-green)"/>

  <!-- Orchestrator → Self-Learn (fire-and-forget) -->
  <line x1="370" y1="240" x2="660" y2="355" stroke="#f78166" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="530" y="285" text-anchor="middle" fill="#f78166" font-size="8" transform="rotate(-25,530,285)">fire &amp; forget</text>

  <!-- Self-learning → Input Guardrail (pattern feedback) -->
  <path d="M665,340 C630,270 620,200 595,155" fill="none" stroke="#f78166" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="610" y="245" text-anchor="middle" fill="#f78166" font-size="8" transform="rotate(-75,610,245)">learned patterns</text>

  <!-- Block arrow -->
  <line x1="517" y1="80" x2="517" y2="68" stroke="#ff6b6b" stroke-width="1.2" marker-end="url(#arr-red)"/>
  <rect x="455" y="48" width="125" height="18" rx="4" fill="#2a0c0c" stroke="#ff6b6b" stroke-width="1"/>
  <text x="517" y="61" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="600">BLOCKED → User</text>

  <!-- Ollama external -->
