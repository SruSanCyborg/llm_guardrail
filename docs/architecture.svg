<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b6b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#0d1117" rx="12"/>
  <rect x="1" y="1" width="898" height="558" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#f0f6fc" font-size="16" font-weight="700" letter-spacing="2">CEREBUS — SYSTEM ARCHITECTURE</text>
  <text x="450" y="52" text-anchor="middle" fill="#8b949e" font-size="10" letter-spacing="1">Dual LLM Guardrail · DevsHouse '26 · VIT Chennai</text>
  <line x1="60" y1="62" x2="840" y2="62" stroke="#30363d" stroke-width="1"/>

  <!-- ── COLUMN 1: Frontend ── -->
  <!-- Chat UI :3000 -->
  <rect x="30" y="90" width="130" height="60" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="95" y="114" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">💬 Chat UI</text>
  <text x="95" y="130" text-anchor="middle" fill="#8b949e" font-size="9">localhost:3000/chat</text>
  <text x="95" y="143" text-anchor="middle" fill="#30363d" font-size="8">Ollama · Groq · Auth</text>

  <!-- Dashboard :3000 -->
  <rect x="30" y="175" width="130" height="60" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="95" y="199" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">📊 Dashboard</text>
  <text x="95" y="215" text-anchor="middle" fill="#8b949e" font-size="9">localhost:3000/dash</text>
  <text x="95" y="228" text-anchor="middle" fill="#30363d" font-size="8">D3.js · Chart.js</text>

  <!-- Monitor :3000 -->
  <rect x="30" y="260" width="130" height="60" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="95" y="284" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">🔬 Monitor</text>
  <text x="95" y="300" text-anchor="middle" fill="#8b949e" font-size="9">localhost:3000/mon</text>
  <text x="95" y="313" text-anchor="middle" fill="#30363d" font-size="8">Self-learn live view</text>

  <!-- Frontend label -->
  <text x="95" y="345" text-anchor="middle" fill="#30363d" font-size="9" font-weight="600" letter-spacing="1">FRONTEND · :3000</text>

  <!-- ── COLUMN 2: Orchestrator ── -->
  <rect x="225" y="115" width="145" height="185" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="297" y="140" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="700">⚡ ORCHESTRATOR</text>
  <text x="297" y="156" text-anchor="middle" fill="#8b949e" font-size="9">localhost:8000</text>
  <line x1="240" y1="163" x2="355" y2="163" stroke="#30363d" stroke-width="1"/>
  <text x="297" y="178" text-anchor="middle" fill="#8b949e" font-size="9">POST /chat</text>
  <text x="297" y="193" text-anchor="middle" fill="#8b949e" font-size="9">Rate limit (Redis)</text>
  <text x="297" y="208" text-anchor="middle" fill="#8b949e" font-size="9">LLM 2nd-opinion review</text>
  <text x="297" y="223" text-anchor="middle" fill="#8b949e" font-size="9">Session routing</text>
  <text x="297" y="238" text-anchor="middle" fill="#8b949e" font-size="9">Audit logging</text>
  <text x="297" y="253" text-anchor="middle" fill="#8b949e" font-size="9">GET /logs  ·  /stats</text>
  <text x="297" y="268" text-anchor="middle" fill="#e3b341" font-size="8">Admin key protected</text>
  <text x="297" y="283" text-anchor="middle" fill="#8b949e" font-size="8">→ Self-learn notify</text>

  <!-- ── COLUMN 3: Guardrails ── -->
  <!-- Input Guardrail -->
  <rect x="440" y="80" width="155" height="115" rx="8" fill="#161b22" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="517" y="102" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">🛡 INPUT GUARDRAIL</text>
  <text x="517" y="117" text-anchor="middle" fill="#8b949e" font-size="9">localhost:8001  ·  /analyze</text>
  <line x1="455" y1="124" x2="580" y2="124" stroke="#30363d" stroke-width="1"/>
  <text x="517" y="138" text-anchor="middle" fill="#8b949e" font-size="9">DistilBERT + LoRA</text>
  <text x="517" y="152" text-anchor="middle" fill="#8b949e" font-size="9">Pattern heuristics (60+ rules)</text>
  <text x="517" y="166" text-anchor="middle" fill="#8b949e" font-size="9">Multi-turn detection</text>
  <text x="517" y="180" text-anchor="middle" fill="#8b949e" font-size="9">Threat vector boost</text>

  <!-- Output Guardrail -->
  <rect x="440" y="380" width="155" height="115" rx="8" fill="#161b22" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="517" y="402" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">🛡 OUTPUT GUARDRAIL</text>
  <text x="517" y="417" text-anchor="middle" fill="#8b949e" font-size="9">localhost:8002  ·  /check</text>
  <line x1="455" y1="424" x2="580" y2="424" stroke="#30363d" stroke-width="1"/>
  <text x="517" y="438" text-anchor="middle" fill="#8b949e" font-size="9">Toxicity (Detoxify)</text>
