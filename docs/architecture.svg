  <text x="737" y="258" text-anchor="middle" fill="#8b949e" font-size="9">FAISS vector search</text>
  <text x="737" y="272" text-anchor="middle" fill="#8b949e" font-size="9">MiniLM-L6-v2 embeddings</text>

